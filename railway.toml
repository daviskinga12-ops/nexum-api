# NEXUM API — Railway Configuration
# ═══════════════════════════════════════════════════

[build]
builder = "nixpacks"

[deploy]
startCommand = "npm start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "nexum-api"
